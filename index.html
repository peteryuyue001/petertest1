<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的公司 - 专业服务提供商</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">公司名称</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="about.html">关于我们</a></li>
                <li><a href="services.html">服务</a></li>
                <li><a href="contact.html">联系我们</a></li>
            </ul>
        </div>
    </nav>

    <!-- 英雄区域 -->
    <section class="hero">
        <div class="hero-content">
            <h1>欢迎来到我们的公司</h1>
            <p>提供高质量的专业服务和解决方案</p>
            <button class="cta-button" onclick="scrollToSection('about')">了解更多</button>
        </div>
    </section>

    <!-- 特色部分 -->
    <section class="features" id="about">
        <div class="container">
            <h2>为什么选择我们</h2>
            <div class="features-grid">
                <div class="feature-card">
                    <div class="feature-icon">🚀</div>
                    <h3>快速服务</h3>
                    <p>我们致力于为客户提供最快的服务响应和解决方案。</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">💎</div>
                    <h3>高质量</h3>
                    <p>每个项目都经过严格的质量控制和测试。</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🤝</div>
                    <h3>专业团队</h3>
                    <p>拥有多年经验的专业团队为您服务。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 统计数据 -->
    <section class="stats">
        <div class="container">
            <div class="stat-item">
                <div class="stat-number">500+</div>
                <div class="stat-label">满意客户</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">50+</div>
                <div class="stat-label">成功项目</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">10+</div>
                <div class="stat-label">年行业经验</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">24/7</div>
                <div class="stat-label">客户支持</div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 我们的公司。版权所有。</p>
            <div class="social-links">
                <a href="#" title="微博">微博</a>
                <a href="#" title="微信">微信</a>
                <a href="#" title="LinkedIn">LinkedIn</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
